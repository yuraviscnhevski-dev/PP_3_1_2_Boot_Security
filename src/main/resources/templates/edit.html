<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Edit User</title>
</head>
<body>
<h1>Edit User</h1>

<form th:action="@{/admin/edit/{id}(id=${user.id})}" th:object="${user}" method="post">
  <input type="hidden" th:field="*{id}"/>

  <div>
    <label>Name:</label>
    <input type="text" th:field="*{name}" required/>
  </div>

  <div>
    <label>Last Name:</label>
    <input type="text" th:field="*{lastName}" required/>
  </div>

  <div>
    <label>Age:</label>
    <input type="number" th:field="*{age}" required/>
  </div>

  <div>
    <label>Username:</label>
    <input type="email" th:field="*{username}" required/>
  </div>

  <div>
    <label>Password:</label>
    <input type="password" th:field="*{password}" placeholder="Leave empty to keep current"/>
  </div>

  <!-- Блок выбора ролей с предвыбором -->
  <div>
    <label>Roles:</label>
    <div th:each="role : ${allRoles}">
      <input type="checkbox" name="roleIds" th:value="${role.id}"
             th:checked="${user.roles.contains(role)}" />
      <span th:text="${role.name}"></span>
    </div>
  </div>

  <button type="submit">Update</button>
  <a href="/admin">Cancel</a>
</form>
</body>
</html>

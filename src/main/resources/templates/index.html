<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Главная страница</title>

        .container { margin-top: 100px; }
        .btn {

            color: white;
            padding: 15px 30px;

<body>

</body>
</html>

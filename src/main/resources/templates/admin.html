<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Панель администратора</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 50px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
    .btn {
      background-color: #4CAF50;
      color: white;
      padding: 10px 15px;
      text-decoration: none;
      border-radius: 3px;
      display: inline-block;
      margin: 5px;
    }
    .btn-delete {
      background-color: #f44336;
    }
    .btn-edit {
      background-color: #008CBA;
    }
  </style>
</head>
<body>
<h1>Панель администратора</h1>

<a th:href="@{/admin/new}" class="btn">Добавить нового пользователя</a>
<a th:href="@{/logout}" class="btn" style="background-color: #666;">Выйти</a>

<h2>Список пользователей</h2>

<table>
  <thead>
  <tr>
    <th>ID</th>
    <th>Имя</th>
    <th>Фамилия</th>
    <th>Возраст</th>
    <th>Логин</th>
    <th>Роли</th>
    <th>Действия</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="user : ${users}">
    <td th:text="${user.id}"></td>
    <td th:text="${user.name}"></td>
    <td th:text="${user.lastName}"></td>
    <td th:text="${user.age}"></td>
    <td th:text="${user.username}"></td>
    <td th:text="${user.roles}"></td>
    <td>
      <a th:href="@{/admin/edit/{id}(id=${user.id})}" class="btn-edit btn">Редактировать</a>
      <form th:action="@{/admin/delete/{id}(id=${user.id})}" method="post" style="display:inline;">
        <button type="submit" class="btn-delete btn" onclick="return confirm('Удалить пользователя?')">Удалить</button>
      </form>
    </td>
  </tr>
  </tbody>
</table>
</body>
</html>
